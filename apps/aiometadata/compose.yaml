services:
  aiometadata:
    image: ghcr.io/cedya77/aiometadata:latest
    container_name: aiometadata
    restart: unless-stopped
    expose:
       - 3232
    env_file:
      - .env
    environment:
      - ADMIN_KEY=
      - ADDON_PASSWORD=
      - REDIS_URL=redis://aiometadata_redis:6379
      - HOST_NAME=aiometadata.replace.me
      - DATABASE_URI=sqlite://addon/data/db.sqlite
    volumes:
      - ./aiometadata/data:/app/addon/data
    networks:
      - pangolin_frontend
      - aiometadata # Make sure to create this network first in Dockhand-> Networks -> "+ Create"
    depends_on:
      aiometadata_redis:
        condition: service_healthy
    tty: true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3232/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  aiometadata_redis:
    image: redis:latest
    container_name: aiometadata_redis
    restart: unless-stopped
    networks:
      - aiometadata
    expose:
      - 6379
    volumes:
      - ./aiometadata/cache:/data
    command: redis-server --appendonly yes --save 3600 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
                
networks:
  pangolin_frontend:
    external: true
  aiometadata:
    external: true
